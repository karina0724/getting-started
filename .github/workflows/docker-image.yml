name: Docker Image CI

on: [push, pull_request]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    env:
      LOCAL_IMAGE_TAG: local/kmontero/getting-started:latest
      REMOTE_IMAGE_TAG: ${{ secrets.MMC_REPO }}/kmontero/getting-started:latest

    steps:
      - name: Source Checkout
        uses: actions/checkout@v4

      - name: Docker login
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.MMC_REPO }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build Image
        run: docker build . --file Dockerfile --tag ${{ env.LOCAL_IMAGE_TAG }}

      - name: Tag Image
        run: docker tag ${{ env.LOCAL_IMAGE_TAG }} ${{ env.REMOTE_IMAGE_TAG }}

      - name: Push to Registry
        run: docker push ${{ env.REMOTE_IMAGE_TAG }}
